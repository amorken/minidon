version: "3.9"

services:
  minidon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: minidon:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MINIDON_LISTEN: ":8080"
      MINIDON_MASTODON_INSTANCE: "${MINIDON_MASTODON_INSTANCE:-mastodon.social}"
      MINIDON_MASTODON_CLIENT_ID: "${MINIDON_MASTODON_CLIENT_ID:-}"
      MINIDON_MASTODON_CLIENT_SECRET: "${MINIDON_MASTODON_CLIENT_SECRET:-}"
      MINIDON_MASTODON_ACCESS_TOKEN: "${MINIDON_MASTODON_ACCESS_TOKEN:-}"
      MINIDON_MASTODON_STREAM: "${MINIDON_MASTODON_STREAM:-public}"
      MINIDON_MEILI_URL: "http://meilisearch:7700"
      MINIDON_MEILI_KEY: "${MINIDON_MEILI_KEY:-minidon-default-master-key-change-me}"
      MINIDON_BUFFER_SIZE: "${MINIDON_BUFFER_SIZE:-500}"
      MINIDON_DISABLE_SEARCH: "${MINIDON_DISABLE_SEARCH:-false}"
      MINIDON_VERBOSE: "${MINIDON_VERBOSE:-false}"
    depends_on:
      meilisearch:
        condition: service_healthy
    networks:
      - minidon-net

  meilisearch:
    image: docker.io/getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: "${MINIDON_MEILI_KEY:-minidon-default-master-key-change-me}"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "7700:7700"
    networks:
      - minidon-net

volumes:
  meili-data:

networks:
  minidon-net:
