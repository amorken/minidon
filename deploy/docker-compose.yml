version: "3.9"

services:
  minidon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: minidon:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MINIDON_LISTEN: ":8080"
      MINIDON_MASTODON_INSTANCE: "${MINIDON_MASTODON_INSTANCE:-mastodon.social}"
      MINIDON_MEILI_URL: "http://meilisearch:7700"
      MINIDON_MEILI_KEY: "${MINIDON_MEILI_KEY:-}"
      MINIDON_BUFFER_SIZE: "${MINIDON_BUFFER_SIZE:-500}"
    depends_on:
      meilisearch:
        condition: service_healthy
    networks:
      - minidon-net

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: "${MINIDON_MEILI_KEY:-changeme}"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - minidon-net

volumes:
  meili-data:

networks:
  minidon-net:
